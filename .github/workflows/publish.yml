name: Publish image to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  verify-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify requirements lockfile
        run: python3 lib/verify_requirements.py
      - name: Verify base images are digest-pinned
        run: python3 lib/verify_base_images.py

  publish:
    needs: verify-supply-chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}"
          SHA_TAG="${IMAGE}:sha-${{ steps.meta.outputs.sha_short }}"

          docker build -t "$SHA_TAG" .
          docker push "$SHA_TAG"

          if [ -n "${{ steps.meta.outputs.version_tag }}" ]; then
            VERSION_TAG="${IMAGE}:${{ steps.meta.outputs.version_tag }}"
            docker tag "$SHA_TAG" "$VERSION_TAG"
            docker push "$VERSION_TAG"
          fi

          LATEST_TAG="${IMAGE}:latest"
          docker tag "$SHA_TAG" "$LATEST_TAG"
          docker push "$LATEST_TAG"
