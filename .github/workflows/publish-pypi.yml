name: Publish to PyPI

# Trusted Publishing — no PyPI API token. The workflow exchanges its GitHub
# OIDC token for a short-lived PyPI upload credential. Configure the trusted
# publisher on PyPI before the first run:
#   https://pypi.org/manage/account/publishing/
#
#   PyPI Project Name: sops-mcp
#   Owner:             privacyplaybook
#   Repository name:   sops-mcp
#   Workflow name:     publish-pypi.yml
#   Environment name:  pypi
#
# Also create a GitHub Environment named `pypi` in repo Settings → Environments
# (deploy-time gate; can also pin allowed branches/tags).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate on a clean dependency vulnerability scan
        uses: ./.github/actions/vuln-scan
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify build artifacts
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Pre-release tags (v1.2.3-rc1) build and vuln-scan above, and publish.yml
    # still produces a cosign-signed image for deploy validation — but they do
    # NOT publish to PyPI. The package version is static in pyproject.toml, so
    # an rc tag would otherwise upload the *final* version's wheel prematurely.
    # Only final tags reach PyPI.
    if: ${{ !contains(github.ref_name, '-') }}
    environment:
      name: pypi
      url: https://pypi.org/p/sops-mcp
    permissions:
      id-token: write   # required for OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Safety net: never fail the release if this version is already on
          # PyPI (e.g. re-run, or it was published out of band). A real
          # "forgot to bump" is still caught by the duplicate being skipped.
          skip-existing: true

  # Create the GitHub Release (notes from CHANGELOG.md) and, for final tags,
  # trigger the MCP registry publish. Runs after `publish` so that — for a
  # final release — the wheel is live before the registry entry (which
  # references it). For a pre-release the `publish` job is skipped, and this
  # still runs to cut the pre-release Release (the reusable workflow does not
  # dispatch the registry for pre-release tags). Skipped only if `publish`
  # actually failed.
  create-release:
    needs: publish
    if: ${{ !cancelled() && needs.publish.result != 'failure' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/create-release.yml
    with:
      tag: ${{ github.ref_name }}
