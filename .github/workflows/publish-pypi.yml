name: Publish to PyPI

# Trusted Publishing — no PyPI API token. The workflow exchanges its GitHub
# OIDC token for a short-lived PyPI upload credential. Configure the trusted
# publisher on PyPI before the first run:
#   https://pypi.org/manage/account/publishing/
#
#   PyPI Project Name: sops-mcp
#   Owner:             privacyplaybook
#   Repository name:   sops-mcp
#   Workflow name:     publish-pypi.yml
#   Environment name:  pypi
#
# Also create a GitHub Environment named `pypi` in repo Settings → Environments
# (deploy-time gate; can also pin allowed branches/tags).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate on a clean dependency vulnerability scan
        uses: ./.github/actions/vuln-scan
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify build artifacts
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sops-mcp
    permissions:
      id-token: write   # required for OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # After the wheel is live on PyPI, create the GitHub Release (notes from
  # CHANGELOG.md) and trigger the MCP registry publish. Only for tag pushes;
  # a manual workflow_dispatch rebuild does not cut a release.
  create-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/create-release.yml
    with:
      tag: ${{ github.ref_name }}
